<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    {% block head %}{% endblock %}
    <link rel="stylesheet" href="{% static 'bases/css/header.css' %}">
    <link rel="stylesheet" href="{% static 'bases/css/footer.css' %}">
</head>
<body>

{% include 'bases/header.html' %}

{% block content %}{% endblock %}

{% block pagination %}{% endblock %}

{% include 'bases/footer.html' %}

{% block script %}{% endblock %}
<script src="{% static 'bases/js/header.js' %}"></script>
<script src="{% static 'bases/js/footer.js' %}"></script>
</body>
</html>
